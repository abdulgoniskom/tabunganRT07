<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Laporan Tabungan RT 07</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
  
  <style>
    body { background-color: #f4f7f6; font-size: 13px; font-family: 'Segoe UI', sans-serif; }
    .header-rt { background: #1a2a3a; color: white; padding: 25px 15px; border-bottom: 5px solid #f39c12; border-radius: 0 0 20px 20px; }
    .card-custom { background: white; border-radius: 15px; padding: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.03); margin-bottom: 15px; }
    .table-responsive { border-radius: 12px; overflow: hidden; }
    .table thead th { background-color: #2c3e50; color: white; font-size: 10px; text-transform: uppercase; }
    .table td { vertical-align: middle; padding: 10px 5px; border-bottom: 1px solid #eee; }
    .nama-warga { font-weight: bold; color: #333; font-size: 10px; }
    .label-filter { font-size: 11px; font-weight: bold; color: #666; margin-bottom: 2px; display: block; }
    .nominal-m { color: #27ae60; font-weight: 500; }
    .nominal-k { color: #e74c3c; font-weight: 500; }
    .btn-aksi { font-size: 10px; padding: 2px 5px; margin: 0 1px; }
  </style>
</head>
<body>

<div class="header-rt text-center shadow">
  <h5 class="fw-bold mb-1">LAPORAN TABUNGAN RT 07</h5>
  <p class="small mb-3 opacity-75">Bumi Indah - Transparansi Saldo Warga</p>
  <div class="d-flex justify-content-center gap-2">
    <button class="btn btn-sm btn-outline-light px-3" id="btnLogin" onclick="promptLogin()">🔓 Admin</button>
    <button class="btn btn-sm btn-warning fw-bold px-3 shadow" onclick="generatePDF()">📥 DOWNLOAD PDF</button>
    <button class="btn btn-sm btn-danger d-none" id="btnLogout" onclick="location.reload()">🔒 Keluar</button>
  </div>
</div>

<div class="container mt-3">
  <div class="card-custom border">
    <div class="row g-2">
      <div class="col-4">
        <label class="label-filter">Tahun</label>
        <select id="fTahun" class="form-select form-select-sm" onchange="applyFilter()"><option value="">Semua</option><option value="2025">2025</option><option value="2026">2026</option></select>
      </div>
      <div class="col-4">
        <label class="label-filter">Bulan</label>
        <select id="fBulan" class="form-select form-select-sm" onchange="applyFilter()"><option value="">Semua</option><option value="-01-">Jan</option><option value="-02-">Feb</option><option value="-03-">Mar</option><option value="-04-">Apr</option><option value="-05-">Mei</option><option value="-06-">Jun</option><option value="-07-">Jul</option><option value="-08-">Agu</option><option value="-09-">Sep</option><option value="-10-">Okt</option><option value="-11-">Nov</option><option value="-12-">Des</option></select>
      </div>
      <div class="col-4">
        <label class="label-filter">Nama Warga</label>
        <select id="fNama" class="form-select form-select-sm" onchange="applyFilter()"><option value="">Semua Nama</option></select>
      </div>
    </div>
  </div>

  <div id="adminArea" class="card-custom d-none border-start border-5 border-primary">
    <h6 class="fw-bold text-primary mb-3 small" id="formTitle">Tambah Data Baru</h6>
    <div class="row g-2">
      <div class="col-12"><input type="date" id="inpTgl" class="form-control form-control-sm"></div>
      <div class="col-12"><select id="inpNama" class="form-select form-select-sm"></select></div>
      <div class="col-6"><input type="number" id="inpMasuk" class="form-control form-control-sm" placeholder="Masuk"></div>
      <div class="col-6"><input type="number" id="inpKeluar" class="form-control form-control-sm" placeholder="Keluar"></div>
      <div class="col-12 d-flex gap-2 mt-2">
        <button class="btn btn-primary btn-sm w-100 fw-bold" id="btnSimpan" onclick="simpanData()">SIMPAN DATA</button>
        <button class="btn btn-secondary btn-sm d-none" id="btnBatal" onclick="batalEdit()">BATAL</button>
      </div>
    </div>
  </div>

  <div class="card-custom p-0 overflow-hidden border shadow-sm">
    <div class="table-responsive">
      <table id="tabelTabungan" class="table table-sm table-striped text-center mb-0 align-middle">
        <thead>
          <tr>
            <th>No</th>
            <th>Tanggal</th>
            <th>Nama Warga</th>
            <th>Masuk</th>
            <th>Keluar</th>
            <th>Saldo</th>
            <th class="col-aksi d-none">Aksi</th>
          </tr>
        </thead>
        <tbody id="isiTabel">
          <tr><td colspan="6" class="p-4 text-muted">Sinkronisasi data...</td></tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

<script>
  const API_URL = "https://script.google.com/macros/s/AKfycbywmbqYcATgwz3alvUgD5L1Imv5_xTFw1tj2Ptwgz1-4a-yLQTsEwBZWS9NLIWbbWg/exec"; 

  let rawData = [], filteredData = [], isAdminMode = false;

  window.onload = loadData;

  function loadData() {
    fetch(API_URL + "?action=read").then(r => r.json()).then(d => { 
      rawData = d; filteredData = d; render(d); 
    });
    fetch(API_URL + "?action=names").then(r => r.json()).then(l => {
      const fNama = document.getElementById('fNama');
      const inpNama = document.getElementById('inpNama');
      const options = l.map(n => `<option value="${n}">${n}</option>`).join('');
      fNama.innerHTML = '<option value="">Semua Nama</option>' + options;
      inpNama.innerHTML = options;
    });
  }

  function render(data) {
    let h = "";
    const formatIndex = (angka) => (parseFloat(angka) === 0 || !angka ? "-" : "Rp " + parseFloat(angka).toLocaleString('id-ID'));
    
    if(!data || data.length === 0) {
      h = `<tr><td colspan="${isAdminMode ? 7 : 6}" class="p-4">Data tidak ditemukan</td></tr>`;
    } else {
      let saldoPersen = {};
      data.forEach((r, i) => {
        let nama = r[2].toUpperCase(), masuk = parseFloat(r[3]) || 0, keluar = parseFloat(r[4]) || 0;
        if (!saldoPersen[nama]) saldoPersen[nama] = 0;
        saldoPersen[nama] += (masuk - keluar);

        h += `<tr>
          <td>${i+1}</td>
          <td style="font-size:9px">${r[1]}</td>
          <td class="text-start nama-warga text-uppercase">${r[2]}</td>
          <td class="nominal-m">${formatIndex(masuk)}</td>
          <td class="nominal-k">${formatIndex(keluar)}</td>
          <td class="fw-bold text-primary">Rp ${saldoPersen[nama].toLocaleString('id-ID')}</td>
          <td class="col-aksi ${isAdminMode ? '' : 'd-none'}">
            <div class="d-flex justify-content-center">
              <button class="btn btn-info btn-aksi" onclick="siapEdit('${r[0]}','${r[1]}','${r[2]}',${masuk},${keluar})">📝</button>
              <button class="btn btn-danger btn-aksi" onclick="hapusData('${r[0]}')">🗑️</button>
            </div>
          </td>
        </tr>`;
      });
    }
    document.getElementById('isiTabel').innerHTML = h;
    updateAksiVisibility();
  }

  function applyFilter() {
    const t = document.getElementById('fTahun').value;
    const b = document.getElementById('fBulan').value;
    const n = document.getElementById('fNama').value.toLowerCase();
    filteredData = rawData.filter(r => (t === "" || r[1].includes(t)) && (b === "" || r[1].includes(b)) && (n === "" || r[2].toLowerCase() === n));
    render(filteredData);
  }

  function promptLogin() {
    const u = prompt("User:"), p = prompt("Pass:");
    if(!u || !p) return;
    fetch(API_URL, { method: "POST", body: JSON.stringify({ action: "login", username: u, password: p }) })
    .then(res => res.text()).then(status => {
      if(status === "SUCCESS") {
        isAdminMode = true;
        document.getElementById('adminArea').classList.remove('d-none');
        document.getElementById('btnLogout').classList.remove('d-none');
        document.getElementById('btnLogin').classList.add('d-none');
        render(filteredData);
      } else alert("Gagal Login!");
    });
  }

  function updateAksiVisibility() {
    document.querySelectorAll('.col-aksi').forEach(el => isAdminMode ? el.classList.remove('d-none') : el.classList.add('d-none'));
  }

  // --- FUNGSI CRUD ---
  function simpanData() {
    const btn = document.getElementById('btnSimpan');
    const d = { action: "save", tanggal: document.getElementById('inpTgl').value, nama: document.getElementById('inpNama').value, masuk: document.getElementById('inpMasuk').value || 0, keluar: document.getElementById('inpKeluar').value || 0 };
    if(!d.tanggal) return alert("Pilih Tanggal!");
    btn.disabled = true; btn.innerHTML = "PROSES...";
    fetch(API_URL, { method: "POST", body: JSON.stringify(d) }).then(() => { alert("Tersimpan!"); resetForm(); loadData(); });
  }

  function hapusData(id) {
    if(!confirm("Hapus data ini, Pak?")) return;
    fetch(API_URL, { method: "POST", body: JSON.stringify({ action: "delete", id: id }) }).then(() => { alert("Dihapus!"); loadData(); });
  }

  function siapEdit(id, tgl, nama, m, k) {
    window.scrollTo(0,0);
    document.getElementById('formTitle').innerText = "Edit Data Terpilih";
    document.getElementById('inpTgl').value = tgl;
    document.getElementById('inpNama').value = nama;
    document.getElementById('inpMasuk').value = m;
    document.getElementById('inpKeluar').value = k;
    document.getElementById('btnBatal').classList.remove('d-none');
    const btn = document.getElementById('btnSimpan');
    btn.innerHTML = "UPDATE DATA"; btn.classList.replace('btn-primary', 'btn-success');
    btn.onclick = () => updateData(id);
  }

  function updateData(id) {
    const d = { action: "edit", id: id, tanggal: document.getElementById('inpTgl').value, nama: document.getElementById('inpNama').value, masuk: document.getElementById('inpMasuk').value || 0, keluar: document.getElementById('inpKeluar').value || 0 };
    fetch(API_URL, { method: "POST", body: JSON.stringify(d) }).then(() => { alert("Data Berhasil Diupdate!"); resetForm(); loadData(); });
  }

  function resetForm() {
    const btn = document.getElementById('btnSimpan');
    document.getElementById('formTitle').innerText = "Tambah Data Baru";
    document.getElementById('inpMasuk').value = ""; document.getElementById('inpKeluar').value = "";
    document.getElementById('btnBatal').classList.add('d-none');
    btn.innerHTML = "SIMPAN DATA"; btn.classList.replace('btn-success', 'btn-primary');
    btn.disabled = false; btn.onclick = simpanData;
  }

  function batalEdit() { resetForm(); }

  // --- PDF GENERATOR ---
  function generatePDF() {
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF('p', 'mm', 'a4');
    const tglCetak = new Date().toLocaleDateString('id-ID', {day:'numeric', month:'long', year:'numeric'});
    
    const filterNama = document.getElementById('fNama').value;
    const filterTahun = document.getElementById('fTahun').value || "Semua Tahun";
    const filterBulan = document.getElementById('fBulan').options[document.getElementById('fBulan').selectedIndex].text;

    // 1. Hitung Totalan
    let totalMasuk = 0;
    let totalKeluar = 0;
    filteredData.forEach(row => {
      totalMasuk += parseFloat(row[3]) || 0;
      totalKeluar += parseFloat(row[4]) || 0;
    });
    const saldoAkhir = totalMasuk - totalKeluar;

    // 2. Header PDF
    doc.setFontSize(14);
    doc.setFont(undefined, 'bold');
    doc.text("LAPORAN TABUNGAN RT 07 - BUMI INDAH", 105, 15, { align: "center" });
    
    doc.setFontSize(10);
    doc.setFont(undefined, 'normal');
    doc.text(`Nama Nasabah : ${filterNama ? filterNama.toUpperCase() : 'SEMUA WARGA'}`, 15, 25);
    doc.text(`Periode Laporan : ${filterBulan} ${filterTahun}`, 15, 30);
    doc.text(`Tanggal Cetak : ${tglCetak}`, 195, 30, { align: "right" });
    doc.line(15, 33, 195, 33); 

    // Fungsi pembantu untuk format Rp dan Strip
    const formatRupiah = (angka) => {
      const num = parseFloat(angka) || 0;
      if (num === 0) return "-";
      return "Rp " + num.toLocaleString('id-ID');
    };

    // 3. Susun Data Tabel
    let saldoJalan = 0;
    const tableBody = filteredData.map((r, i) => {
      const masuk = parseFloat(r[3]) || 0;
      const keluar = parseFloat(r[4]) || 0;
      saldoJalan += (masuk - keluar);

      return [
        i + 1, 
        r[1], 
        r[2].toUpperCase(), 
        formatRupiah(masuk), 
        formatRupiah(keluar),
        "Rp " + saldoJalan.toLocaleString('id-ID')
      ];
    });

    doc.autoTable({
      head: [['No', 'Tanggal', 'Nama Warga', 'Masuk', 'Keluar', 'Saldo']],
      body: tableBody,
      startY: 38,
      theme: 'grid',
      headStyles: { fillColor: [26, 42, 58], halign: 'center' },
      styles: { fontSize: 8 },
      columnStyles: { 
        0: { halign: 'center' }, 
        3: { halign: 'right' }, 
        4: { halign: 'right' }, 
        5: { halign: 'right' } 
      },
      foot: [
        [{ content: 'TOTAL MASUK', colSpan: 5, styles: { halign: 'right', fontStyle: 'bold' } }, { content: "Rp " + totalMasuk.toLocaleString('id-ID'), styles: { halign: 'right' } }],
        [{ content: 'TOTAL KELUAR', colSpan: 5, styles: { halign: 'right', fontStyle: 'bold' } }, { content: "Rp " + totalKeluar.toLocaleString('id-ID'), styles: { halign: 'right' } }],
        [{ content: 'TOTAL SALDO AKHIR', colSpan: 5, styles: { halign: 'right', fontStyle: 'bold' } }, { content: "Rp " + saldoAkhir.toLocaleString('id-ID'), styles: { halign: 'right', fillColor: [243, 156, 18], textColor: [0, 0, 0] } }]
      ]
    });

    // 4. Tanda Tangan
    const finalY = doc.lastAutoTable.finalY + 15;
    doc.setFontSize(10);
    doc.text("Tangerang, " + tglCetak, 150, finalY);
    doc.text("Ibu RT 07,", 40, finalY + 10);
    doc.text("Bendahara Tabungan,", 150, finalY + 10);
    doc.setFont(undefined, 'bold');
    doc.text("( Emil Jamilah )", 40, finalY + 35);
    doc.text("( Sri Maryani )", 150, finalY + 35);

    doc.save(`Laporan_${filterNama || 'RT07'}.pdf`);
  }
</script>
</body>
</html>
