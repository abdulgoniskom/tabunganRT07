<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background-color: #f8f9fa; font-size: 13px; }
    .header-rt { background: #1a2a3a; color: white; padding: 20px; border-bottom: 5px solid #f39c12; }
    .table-responsive { font-size: 11px; }
    @media print { .no-print { display: none !important; } .print-only { display: block !important; } }
    .print-only { display: none; }
  </style>
</head>
<body>

<div class="header-rt text-center">
  <h5 class="fw-bold">LAPORAN TABUNGAN RT 07</h5>
  <div class="no-print d-flex justify-content-center gap-2 mt-2">
    <button class="btn btn-sm btn-outline-light" onclick="promptLogin()">Admin</button>
    <button class="btn btn-sm btn-warning" onclick="window.print()">Cetak</button>
  </div>
</div>

<div class="container mt-3">
  <div class="row g-2 mb-3 no-print">
    <div class="col-6"><select id="fTahun" class="form-select form-select-sm" onchange="render(filterData())"><option value="">Semua Tahun</option><option value="2025">2025</option><option value="2026">2026</option></select></div>
    <div class="col-6"><select id="fBulan" class="form-select form-select-sm" onchange="render(filterData())"><option value="">Semua Bulan</option><option value="-01-">Januari</option><option value="-02-">Februari</option><option value="-03-">Maret</option></select></div>
  </div>

  <div id="adminArea" class="card p-3 mb-3 d-none no-print shadow-sm">
    <div class="row g-2">
      <div class="col-6"><input type="date" id="inpTgl" class="form-control form-control-sm"></div>
      <div class="col-6"><select id="inpNama" class="form-select form-select-sm"></select></div>
      <div class="col-6"><input type="number" id="inpMasuk" class="form-control form-control-sm" placeholder="Masuk"></div>
      <div class="col-6"><input type="number" id="inpKeluar" class="form-control form-control-sm" placeholder="Keluar"></div>
      <button class="btn btn-primary btn-sm mt-2" onclick="simpan()">Simpan</button>
    </div>
  </div>

  <div class="table-responsive bg-white shadow-sm rounded">
    <table class="table table-sm table-striped text-center mb-0">
      <thead class="table-dark"><tr><th>No</th><th>Tanggal</th><th>Nama</th><th>M</th><th>K</th><th>Saldo</th></tr></thead>
      <tbody id="isiTabel"><tr><td colspan="6" class="p-4">Memuat data...</td></tr></tbody>
    </table>
  </div>
</div>

<script>
  // !!! GANTI DENGAN URL WEB APP GOOGLE ANDA !!!
  const API_URL = "https://script.google.com/macros/s/AKfycbzBxMdL1MRtZld14eXlEno9MVJEkzawAlGJ14KPiXcjaFr1EAqwrqHx-kTZ22gMbCE/exec"; 

  let rawData = [];

  window.onload = loadData;

  function loadData() {
    fetch(API_URL + "?action=read")
      .then(r => r.json())
      .then(d => { rawData = d; render(d); });
  }

  function render(d) {
    let h = "";
    d.forEach((r, i) => {
      h += `<tr><td>${i+1}</td><td>${r[1]}</td><td class="text-start fw-bold">${r[2]}</td><td>${r[3]}</td><td>${r[4]}</td><td>${r[5]}</td></tr>`;
    });
    document.getElementById('isiTabel').innerHTML = h || "<tr><td colspan='6'>Data tidak ditemukan</td></tr>";
  }

  function filterData() {
    const t = document.getElementById('fTahun').value;
    const b = document.getElementById('fBulan').value;
    return rawData.filter(r => (t === "" || r[1].includes(t)) && (b === "" || r[1].includes(b)));
  }

  function promptLogin() {
    const u = prompt("User:"), p = prompt("Pass:");
    if(u === "TabunganRT" && p === "Bumiindah07") {
      document.getElementById('adminArea').classList.remove('d-none');
      fetch(API_URL + "?action=names").then(r => r.json()).then(l => {
        let s = document.getElementById('inpNama');
        s.innerHTML = l.map(n => `<option value="${n}">${n}</option>`).join('');
      });
    } else alert("Salah!");
  }

  function simpan() {
    const d = {
      tanggal: document.getElementById('inpTgl').value,
      nama: document.getElementById('inpNama').value,
      masuk: document.getElementById('inpMasuk').value,
      keluar: document.getElementById('inpKeluar').value
    };
    fetch(API_URL, { method: "POST", body: JSON.stringify(d) })
      .then(r => r.text()).then(m => { alert(m); loadData(); });
  }
</script>
</body>
</html>
